<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Biology Models</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:black;
}

/* Background Model */

.background{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.background iframe{
width:100%;
height:100%;
border:none;
}


/* Title */

.title{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:32px;
font-weight:bold;
text-shadow:0 0 10px black;
z-index:100;
}


/* Container for both models */

.models-container{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:space-around;
align-items:center;
}


/* Each model block */

.model-box{

width:40%;
height:60%;
border-radius:20px;
overflow:hidden;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

box-shadow:0 0 20px rgba(255,255,255,.5);
}


.model-box iframe{

width:100%;
height:100%;
border:none;

}


.label{

text-align:center;
font-size:22px;
color:white;
padding:10px;
background:rgba(0,0,0,.5);

}


/* Mobile responsive */

@media(max-width:768px){

.models-container{

flex-direction:column;
gap:20px;

}

.model-box{

width:90%;
height:35%;

}

.title{

font-size:24px;

}

}

</style>

</head>

<body>

<!-- Background -->

<div class="background">

<iframe
src="https://sketchfab.com/models/c062a59612bd40e2a56cbb3082448637/embed?autostart=1&ui_controls=0&ui_infos=0"
allow="autoplay; fullscreen; xr-spatial-tracking">
</iframe>

</div>


<div class="title">

🌿 Explore Biology in VR

</div>


<div class="models-container">

    <!-- Stomata -->

    <div class="model-box">

        <div class="label">
        🌱 Stomata
        </div>

        <iframe
        src="https://sketchfab.com/models/00ffda2fc813426a9852abe6350332ca/embed?autostart=1&ui_controls=0&ui_infos=0"
        allow="autoplay; fullscreen; xr-spatial-tracking">
        </iframe>

    </div>


    <!-- Photosynthesis -->

    <div class="model-box">

        <div class="label">
        ☀️ Photosynthesis
        </div>

        <iframe
        src="https://sketchfab.com/models/447ba8d6d1b74668853fd6096ec89435/embed?autostart=1&ui_controls=0&ui_infos=0"
        allow="autoplay; fullscreen; xr-spatial-tracking">
        </iframe>

    </div>

</div>

</body>
</html>
